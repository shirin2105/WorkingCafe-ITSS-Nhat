<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Cafe - Detail</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="detail-body">
    <!-- Header Area -->
    <header class="detail-header">
        <div class="header-logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <img src="WorkingCafe-Logo.png" alt="Logo" class="header-logo-img">
            <span>WORKING CAFE</span>
        </div>
        <div class="header-icons">
            <div class="notification-wrapper">
                <i class="fa-regular fa-bell notification-icon" id="notificationBtn"></i>
                <div class="dropdown-menu hidden" id="notificationDropdown">
                    <p class="dropdown-empty">通知はありません</p>
                </div>
            </div>
            <i class="fa-regular fa-circle-user" id="profileBtn"></i>
        </div>
    </header>

    <!-- Main Content -->
    <main class="detail-main">
        <!-- Photo Gallery -->
        <div class="gallery-section">
            <div class="gallery-grid">
                <!-- Large Photo -->
                <div class="gallery-item large-photo">
                    <img src="https://placehold.co/600x400/333/fff?text=Placeholder:\nCafe+Interior" alt="Cafe Interior" id="detailHeroImage">
                    <div class="more-photos-text" id="detailMorePhotos">その他の写真を見る</div>
                </div>
                <!-- Vertical Photo -->
                <div class="gallery-item vertical-photo">
                    <img src="https://placehold.co/300x400/555/fff?text=Placeholder:\nDrink+1" alt="Drink">
                </div>
                <!-- Horizontal Photos -->
                <div class="gallery-item horizontal-photos">
                    <img src="https://placehold.co/300x195/777/fff?text=Placeholder:\nDrink+2" alt="Coffee Cup">
                    <img src="https://placehold.co/300x195/999/fff?text=Placeholder:\nDrink+3" alt="Coffee Art">
                </div>
            </div>
            <i class="fa-solid fa-pen-to-square edit-icon gallery-edit"></i>
        </div>

        <!-- Info Header -->
        <div class="info-header">
            <div class="info-title-row">
                <h1 class="cafe-name" id="detailCafeName">ABCカフェ <i class="fa-solid fa-pen-to-square title-edit-icon"></i></h1>
                <div class="detail-title-actions">
                    <div class="cafe-rating" id="detailCafeRating">
                        <i class="fa-solid fa-star"></i> 4.6/5
                    </div>
                    <button class="favorite-btn" id="detailFavoriteBtn" aria-label="Favorite">
                        <i class="fa-regular fa-heart"></i>
                    </button>
                </div>
            </div>
            <p class="cafe-address" id="detailCafeAddress"><strong>アドレス:</strong> 106 Pham Ngoc Thach Street, ハノイ, ベトナム</p>
            <div class="cafe-time" id="detailCafeTime">
                <i class="fa-regular fa-clock"></i>
                <span id="detailCafeTimeText">8:00 - 19:00</span>
                <i class="fa-solid fa-pen-to-square time-edit-icon"></i>
            </div>
        </div>

        <!-- Detail Body Grid -->
        <div class="detail-body-grid">
            <!-- Bestseller Section -->
            <div class="bestseller-section">
                <h2 class="section-title" id="detailBestsellerTitle">ベストセラー</h2>
                <div class="bestseller-box">
                    <div class="drink-list" id="detailBestsellers">
                    </div>
                    <div class="view-menu-text" id="detailMenuLink">メニュー全体を見る</div>
                    <i class="fa-solid fa-pen-to-square edit-icon box-edit"></i>
                </div>
            </div>

            <!-- Criteria Section -->
            <div class="criteria-section">
                <h2 class="section-title" id="detailCriteriaTitle">クライテリア</h2>
                <div class="criteria-box">
                    <ul class="criteria-list" id="detailCriteria">
                    </ul>
                    <i class="fa-solid fa-pen-to-square edit-icon box-edit"></i>
                </div>
            </div>
        </div>

        <!-- Review Section -->
        <div class="review-section">
            <h2 class="review-title"><span id="detailReviewTitle">評価</span></h2>
            
            <div class="review-list" id="detailReviewList">
            </div>

            <div class="more-reviews" id="detailMoreReviews">その他の評価を見る</div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab-calendar" id="detailBookingBtn">
        <i class="fa-regular fa-calendar-days"></i>
    </button>

    <script src="api.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initCafeDetailPage === 'function') {
                initCafeDetailPage();
            }
        });
    </script>
</body>
</html>
