<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Cafe - Detail</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="detail-body">
    <!-- Header Area -->
    <header class="detail-header">
        <div class="header-logo">
            <img src="WorkingCafe-Logo.png" alt="Logo" class="header-logo-img">
            <span>WORKING CAFE</span>
        </div>
        <div class="header-icons">
            <div class="notification-wrapper">
                <i class="fa-regular fa-bell notification-icon" id="notificationBtn"></i>
                <div class="dropdown-menu hidden" id="notificationDropdown">
                    <p class="dropdown-empty">通知はありません</p>
                </div>
            </div>
            <i class="fa-regular fa-circle-user"></i>
        </div>
    </header>

    <!-- Main Content -->
    <main class="detail-main">
        <!-- Photo Gallery -->
        <div class="gallery-section">
            <div class="gallery-grid">
                <!-- Large Photo -->
                <div class="gallery-item large-photo">
                    <img src="https://placehold.co/600x400/333/fff?text=Placeholder:\nCafe+Interior" alt="Cafe Interior">
                    <div class="more-photos-text">その他の写真を見る</div>
                </div>
                <!-- Vertical Photo -->
                <div class="gallery-item vertical-photo">
                    <img src="https://placehold.co/300x400/555/fff?text=Placeholder:\nDrink+1" alt="Drink">
                </div>
                <!-- Horizontal Photos -->
                <div class="gallery-item horizontal-photos">
                    <img src="https://placehold.co/300x195/777/fff?text=Placeholder:\nDrink+2" alt="Coffee Cup">
                    <img src="https://placehold.co/300x195/999/fff?text=Placeholder:\nDrink+3" alt="Coffee Art">
                </div>
            </div>
            <i class="fa-solid fa-arrow-up-right-from-square edit-icon gallery-edit"></i>
        </div>

        <!-- Info Header -->
        <div class="info-header">
            <div class="info-title-row">
                <h1 class="cafe-name">ABCカフェ <i class="fa-solid fa-arrow-up-right-from-square title-edit-icon"></i></h1>
                <div class="cafe-rating">
                    <i class="fa-solid fa-star"></i> 4.6/5
                </div>
            </div>
            <p class="cafe-address"><strong>アドレス:</strong> 106 Pham Ngoc Thach Street, ハノイ, ベトナム</p>
            <div class="cafe-time">
                <i class="fa-regular fa-clock"></i> 8:00 - 19:00 
                <i class="fa-solid fa-arrow-up-right-from-square time-edit-icon"></i>
            </div>
        </div>

        <!-- Detail Body Grid -->
        <div class="detail-body-grid">
            <!-- Bestseller Section -->
            <div class="bestseller-section">
                <h2 class="section-title">ベストセラー</h2>
                <div class="bestseller-box">
                    <div class="drink-list">
                        <img src="https://placehold.co/100x120/f39c12/fff?text=Placeholder:\nJuice" alt="Juice" class="drink-img">
                        <img src="https://placehold.co/100x120/8e44ad/fff?text=Placeholder:\nLatte" alt="Latte" class="drink-img">
                        <img src="https://placehold.co/100x120/27ae60/fff?text=Placeholder:\nMatcha" alt="Matcha" class="drink-img">
                    </div>
                    <div class="view-menu-text">メニュー全体を見る</div>
                    <i class="fa-solid fa-arrow-up-right-from-square edit-icon box-edit"></i>
                </div>
            </div>

            <!-- Criteria Section -->
            <div class="criteria-section">
                <h2 class="section-title">クライテリア</h2>
                <div class="criteria-box">
                    <ul class="criteria-list">
                        <li>デスクあり</li>
                        <li>コンセントあり</li>
                        <li>Wi-Fiあり</li>
                        <li>エアコンあり</li>
                    </ul>
                    <i class="fa-solid fa-arrow-up-right-from-square edit-icon box-edit"></i>
                </div>
            </div>
        </div>

        <!-- Review Section -->
        <div class="review-section">
            <h2 class="review-title"><span>評価</span></h2>
            
            <div class="review-list">
                <!-- Review Card 1 -->
                <div class="review-card">
                    <div class="review-card-header">
                        <div class="reviewer-info">
                            <i class="fa-regular fa-circle-user reviewer-icon"></i>
                            <span class="reviewer-name">田中</span>
                        </div>
                        <div class="review-stars">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star" style="color: #ccc;"></i>
                        </div>
                    </div>
                    <p class="review-text">飲み物は美味しい、快適な空気。</p>
                </div>

                <!-- Review Card 2 -->
                <div class="review-card">
                    <div class="review-card-header">
                        <div class="reviewer-info">
                            <i class="fa-regular fa-circle-user reviewer-icon"></i>
                            <span class="reviewer-name">田中</span>
                        </div>
                        <div class="review-stars">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star" style="color: #ccc;"></i>
                        </div>
                    </div>
                    <p class="review-text">飲み物は美味しい、快適な空気。</p>
                </div>
            </div>

            <div class="more-reviews">
                その他の評価を見る
            </div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab-calendar">
        <i class="fa-regular fa-calendar-days"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
