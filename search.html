<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Cafe - Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="search-body">
    <header class="detail-header search-header">
        <div class="header-logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <img src="WorkingCafe-Logo.png" alt="Logo" class="header-logo-img">
            <span>WORKING CAFE</span>
        </div>
        <div class="search-header-center">
            <div class="search-bar wide">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchKeyword" placeholder="検索...">
            </div>
        </div>
        <div class="header-icons">
            <div class="notification-wrapper">
                <i class="fa-regular fa-bell notification-icon" id="notificationBtn"></i>
                <div class="dropdown-menu hidden" id="notificationDropdown">
                    <p class="dropdown-empty">通知はありません</p>
                </div>
            </div>
            <i class="fa-regular fa-circle-user" id="profileBtn"></i>
        </div>
    </header>

    <main class="search-main">
        <section class="search-filters">
            <div class="search-filter-bar">
                <div class="filter-dropdown-wrap">
                    <button type="button" class="filter-btn" id="filterLocationBtn">
                        <i class="fa-solid fa-location-dot"></i>
                        <span class="filter-btn-text">地点</span>
                        <i class="fa-solid fa-chevron-down filter-btn-caret"></i>
                    </button>
                    <div class="filter-group" id="filterLocationGroup">
                        <label class="filter-label">地点</label>
                        <select id="filterLocation" multiple></select>
                    </div>
                </div>

                <div class="filter-dropdown-wrap">
                    <button type="button" class="filter-btn" id="filterFeatureBtn">
                        <i class="fa-solid fa-sliders"></i>
                        <span class="filter-btn-text">特徴</span>
                        <i class="fa-solid fa-chevron-down filter-btn-caret"></i>
                    </button>
                    <div class="filter-group" id="filterFeatureGroup">
                        <label class="filter-label">特徴</label>
                        <div id="featureList" class="filter-tags"></div>
                    </div>
                </div>

                <div class="filter-dropdown-wrap">
                    <button type="button" class="filter-btn" id="filterTimeBtn">
                        <i class="fa-regular fa-clock"></i>
                        <span class="filter-btn-text">時間</span>
                        <i class="fa-solid fa-chevron-down filter-btn-caret"></i>
                    </button>
                    <div class="filter-group" id="filterTimeGroup">
                        <label class="filter-label">時間</label>
                        <select id="filterTime"></select>
                    </div>
                </div>
            </div>
            <div class="search-tags" id="activeTags"></div>
        </section>

        <section class="search-results-panel">
            <div class="search-result-header">
                <div class="search-suggest">
                    <span id="suggestLabel">提案:</span>
                    <span id="resultCount" class="result-count">0</span>
                    <span id="suggestUnit">店</span>
                </div>
                <div class="search-pagination">
                    <button type="button" class="pager-btn" id="prevPage" aria-label="Previous">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button type="button" class="pager-btn" id="nextPage" aria-label="Next">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>
            <div class="cafe-grid search-grid" id="searchResults"></div>
        </section>
    </main>

    <script src="api.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initSearchPage === 'function') {
                initSearchPage();
            }
        });
    </script>
</body>
</html>
