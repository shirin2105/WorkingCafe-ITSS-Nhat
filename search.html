<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Cafe - Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="search-body">
    <header class="search-header">
        <div class="header-logo" onclick="window.location.href='index.html'">
            <img src="WorkingCafe-Logo.png" alt="Logo" class="header-logo-img">
            <span>WORKING CAFE</span>
        </div>
        <div class="search-header-center">
            <div class="search-bar wide">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchKeyword" placeholder="検索...">
            </div>
        </div>
        <div class="header-icons">
            <div class="notification-wrapper">
                <i class="fa-regular fa-bell notification-icon" id="notificationBtn"></i>
                <div class="dropdown-menu hidden" id="notificationDropdown">
                    <p class="dropdown-empty">通知はありません</p>
                </div>
            </div>
            <i class="fa-regular fa-circle-user" id="profileBtn"></i>
        </div>
    </header>

    <main class="search-main">
        <section class="search-filter-panel">
            <div class="filter-icon-row">
                <span class="filter-icon"><i class="fa-solid fa-plus"></i></span>
                <span class="filter-icon"><i class="fa-solid fa-plus"></i></span>
                <span class="filter-icon"><i class="fa-solid fa-plus"></i></span>
                <span class="filter-icon"><i class="fa-solid fa-plus"></i></span>
            </div>
            <div class="filter-pill-row">
                <button class="filter-btn" id="filterLocationBtn">地点</button>
                <button class="filter-btn" id="filterFeatureBtn">特徴</button>
                <button class="filter-btn" id="filterTimeBtn">時間</button>
            </div>

            <div class="filter-popovers">
                <div class="filter-group" id="filterLocationGroup">
                    <label class="filter-label">地点</label>
                    <select id="filterLocation" multiple></select>
                </div>

                <div class="filter-group" id="filterFeatureGroup">
                    <label class="filter-label">特徴</label>
                    <div id="featureList" class="filter-tags"></div>
                </div>

                <div class="filter-group" id="filterTimeGroup">
                    <label class="filter-label">時間</label>
                    <select id="filterTime"></select>
                </div>
            </div>
        </section>

        <section class="search-results-panel">
            <div class="search-result-header">
                <div class="search-suggest">
                    <span id="suggestLabel">提案:</span>
                    <span id="resultCount" class="result-count">0</span>
                    <span id="suggestUnit">店</span>
                </div>
            </div>
            <div class="search-tags" id="activeTags"></div>
            <div class="search-carousel">
                <button class="pager-btn circle" id="prevPage" aria-label="Previous">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="cafe-grid search-grid" id="searchResults"></div>
                <button class="pager-btn circle" id="nextPage" aria-label="Next">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>
    </main>

    <script src="api.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initSearchPage === 'function') {
                initSearchPage();
            }
        });
    </script>
</body>
</html>
