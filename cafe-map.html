<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Cafe - Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="map-body">
    <header class="detail-header">
        <div class="header-logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <img src="WorkingCafe-Logo.png" alt="Logo" class="header-logo-img">
            <span>WORKING CAFE</span>
        </div>
        <div class="header-icons">
            <div class="notification-wrapper">
                <i class="fa-regular fa-bell notification-icon" id="notificationBtn"></i>
                <div class="dropdown-menu hidden" id="notificationDropdown">
                    <p class="dropdown-empty">通知はありません</p>
                </div>
            </div>
            <i class="fa-regular fa-circle-user" id="profileBtn"></i>
        </div>
    </header>

    <main class="map-main-layout">
        <aside class="map-sidebar">
            <img src="https://placehold.co/400x300/333/fff?text=Placeholder:\nCafe+Interior" alt="Cafe Image"
                class="sidebar-img" id="mapCafeImage">

            <div class="sidebar-content">
                <div class="sidebar-info-row cafe-name-row">
                    <h1 class="sidebar-cafe-name" id="mapCafeName">Cafe ABC</h1>
                </div>

                <div class="sidebar-info-row">
                    <i class="fa-solid fa-location-dot"></i>
                    <span id="mapCafeAddress">Số 1, Đại La, Hà Nội</span>
                </div>

                <div class="sidebar-info-row">
                    <i class="fa-regular fa-clock"></i>
                    <span id="mapCafeTime">9h - 17h</span>
                </div>

                <div class="sidebar-rating-row">
                    <div class="rating-box" id="mapCafeRating">
                        <i class="fa-solid fa-star"></i> 4.6/5
                    </div>
                    <i class="fa-solid fa-pen-to-square edit-icon sidebar-edit" id="mapCafeEdit"></i>
                </div>

                <p class="map-location-hint hidden" id="mapLocationHint"></p>

                <div class="map-sidebar-actions">
                    <a href="#" id="mapViewDetailBtn" class="map-sidebar-btn hidden"></a>
                    <button type="button" id="mapSetLocationBtn" class="map-sidebar-btn hidden"></button>
                </div>
            </div>
        </aside>

        <div class="map-area">
            <div class="map-search-panel hidden" id="mapSearchPanel">
                <div class="map-search-row">
                    <i class="fa-solid fa-magnifying-glass map-search-icon"></i>
                    <input type="text" id="mapLocationSearch" class="map-search-input"
                        placeholder="Tìm địa chỉ tại Việt Nam..." autocomplete="off">
                    <button type="button" id="mapLocationSearchBtn" class="map-search-btn">Tìm</button>
                </div>
                <ul id="mapSearchResults" class="map-search-results hidden" role="listbox"></ul>
            </div>
            <div id="mapFrame" class="map-frame"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="api.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initCafeMapPage === 'function') {
                initCafeMapPage();
            }
        });
    </script>
</body>

</html>
