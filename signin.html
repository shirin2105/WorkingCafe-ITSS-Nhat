<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Cafe - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signup-container">
        <!-- Left Side: Form Area -->
        <div class="form-side">
            <form id="signinForm" class="signup-form">
                
                <div class="input-group">
                    <input type="text" id="emailOrUsername" placeholder="メール/ユーザー名" required>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="パスワード" required>
                </div>

                <button type="submit" class="submit-btn">ログイン</button>

                <div class="login-link-container">
                    <span>アカウントをお持ちでない方？</span>
                    <a href="index.html" class="login-link">登録</a>
                </div>
            </form>
        </div>

        <!-- Right Side: Image Area -->
        <div class="image-side">
            <div class="logo-card">
                <img src="WorkingCafe-Logo.png" alt="Working Cafe Logo" class="logo-image">
                <h1 class="logo-text">WORKING CAFE</h1>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
